  /* Dark vignette overlay */
  .bg::after {
    content: "";
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 60% 50%, rgba(180,0,0,0.15) 0%, rgba(60,0,0,0.55) 100%);
  }

  /* Floating glass card */
  .card {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%) scale(0.88);
    opacity: 0;
    animation: floatIn 1.1s cubic-bezier(0.22, 1, 0.36, 1) 0.3s forwards;
    z-index: 10;

    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(22px) saturate(1.4);
    -webkit-backdrop-filter: blur(22px) saturate(1.4);
    border: 1px solid rgba(255,255,255,0.18);
    border-radius: 24px;
    padding: 56px 64px 52px;
    width: min(600px, 90vw);
    text-align: center;
    box-shadow:
      0 32px 80px rgba(0,0,0,0.45),
      0 0 0 1px rgba(255,255,255,0.06) inset,
      0 2px 0 rgba(255,255,255,0.15) inset;
  }

  @keyframes floatIn {
    to { opacity: 1; transform: translate(-50%, -50%) scale(1); }
  }

  /* Subtle float loop */
  .card-inner {
    animation: gentleFloat 6s ease-in-out 1.4s infinite alternate;
  }

  @keyframes gentleFloat {
    from { transform: translateY(0px); }
    to   { transform: translateY(-8px); }
  }

  /* Logo */
  .logo-wrap {
    display: flex;
    justify-content: center;
    margin-bottom: 36px;
    opacity: 0;
    animation: fadeUp 0.8s ease 0.9s forwards;
  }

  .logo-wrap img {
    height: 120px;
    filter: brightness(0) invert(1);
    drop-shadow: 0 2px 8px rgba(0,0,0,0.3);
  }

  /* Divider line */
  .divider {
    width: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.6), transparent);
    margin: 0 auto 32px;
    animation: expandLine 0.9s ease 1.1s forwards;
  }

  @keyframes expandLine {
    to { width: 80%; }
  }

  /* Welcome text */
  .welcome {
    font-size: 11px;
    letter-spacing: 5px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.95);
    margin-bottom: 12px;
    opacity: 0;
    animation: fadeUp 0.7s ease 1.2s forwards;
  }

  /* Main heading */
  .headline {
    font-family: "Bebas Neue", sans-serif;
    font-size: clamp(52px, 6vw, 68px);
    letter-spacing: 3px;
    line-height: 1.05;
    color: #ffffff;
    text-shadow: 0 4px 24px rgba(0,0,0,0.4);
    margin-bottom: 8px;
    opacity: 0;
    animation: fadeUp 0.7s ease 1.35s forwards;
  }

  .headline span {
    display: block;
    color: rgba(255,255,255,0.95);
    font-size: 0.62em;
    letter-spacing: 6px;
  }

  /* Subtitle */
  .subtitle {
    font-size: 13px;
    font-weight: 300;
    color: rgba(255,255,255,0.95);
    letter-spacing: 2px;
    margin-top: 18px;
    margin-bottom: 40px;
    opacity: 0;
    animation: fadeUp 0.7s ease 1.5s forwards;
  }

  /* CTA button */
  .cta {
    display: inline-block;
    padding: 14px 38px;
    background: rgba(255,255,255,0.12);
    border: 1px solid rgba(255,255,255,0.35);
    border-radius: 100px;
    color: #ffffff;
    font-family: "Montserrat", sans-serif;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 3px;
    text-transform: uppercase;
    text-decoration: none;
    cursor: pointer;
    transition: background 0.3s ease, transform 0.2s ease, box-shadow 0.3s ease;
    opacity: 0;
    animation: fadeUp 0.7s ease 1.65s forwards;
  }

  .cta:hover {
    background: rgba(255,255,255,0.22);
    transform: translateY(-2px);
    box-shadow: 0 12px 32px rgba(0,0,0,0.3);
  }

  /* Small corner logo (color version) */
  .corner-logo {
    position: fixed;
    bottom: 32px; right: 36px;
    z-index: 20;
    opacity: 0;
    animation: fadeIn 1s ease 2s forwards;
  }

  .corner-logo img {
    height: 32px;
    opacity: 0.7;
  }

  /* Ambient light orbs */
  .orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.18;
    pointer-events: none;
    z-index: 1;
    animation: pulse 8s ease-in-out infinite alternate;
  }

  .orb-1 {
    width: 500px; height: 500px;
    background: radial-gradient(circle, #ff4444, transparent);
    top: -100px; left: -100px;
    animation-delay: 0s;
  }

  .orb-2 {
    width: 400px; height: 400px;
    background: radial-gradient(circle, #ff0000, transparent);
    bottom: -80px; right: -80px;
    animation-delay: 3s;
  }

  @keyframes pulse {
    from { opacity: 0.12; transform: scale(1); }
    to   { opacity: 0.25; transform: scale(1.15); }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeIn {
    to { opacity: 1; }
  }

  /* Grain overlay for texture */
  .grain {
    position: fixed;
    inset: 0;
    z-index: 5;
    pointer-events: none;
    opacity: 0.04;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size: 200px 200px;
  }
</style>
</head>
